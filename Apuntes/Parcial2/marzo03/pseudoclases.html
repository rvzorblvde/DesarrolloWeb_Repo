<head>

    <!--Pesudoclases-->
    <style>
        div {
            width: 250px;
            height: 150px;
            margin: 5px;
            background-color: blue;
            transition-property: width background-color;
            transition-duration: 3s;
            /*transition-delay: 2s;*/
            transition-timing-function: ease-in-out;
            display: block;
            float: left;
            /*transition: width 3s 0s linear;*/
        }

        div:active {
            background-color: red;
            width: 1500px;
            height: 500px;
            /*display: inline-block;*/
            float: right;
        }

        div:hover {
            background-color: red;
            
        }

        p {
            color: green;
            font-size: medium;
        }

        p:active {
            color: blue;
            font-size: large;
        }

        input:focus {
            font-size: larger;
            color: red;
        }
    </style>

</head>
